name: cicd pipeline

on:
  push:
    branches: ["main"]

jobs:

# =========================
# 1. BUILD
# =========================
  compile:
    runs-on: agent-1

    steps:
      - uses: actions/checkout@v4

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Application
        run: mvn clean install -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar


# =========================
# 2. SECURITY SCAN
# =========================
  SecurityCheck:
    runs-on: agent-1
    needs: compile

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy Scan
        run: trivy fs --scanners vuln --format json -o fs-report.json .

      - name: Install Gitleaks
        run: sudo apt install -y gitleaks

      - name: Run Gitleaks
        run: gitleaks detect -r gitleaks-report.json -f json

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            fs-report.json
            gitleaks-report.json


# =========================
# 3. TEST
# =========================
  test:
    runs-on: agent-1
    needs: SecurityCheck

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: mvn test


# =========================
# 4. SONARQUBE
# =========================
  sonar_scan:
    runs-on: agent-1
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Sonar Analysis
        run: |
          mvn clean verify sonar:sonar \
          -Dsonar.projectKey=your_project_key \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}


# =========================
# 5. DOCKER BUILD & PUSH
# =========================
  docker:
    runs-on: agent-1
    needs: sonar_scan

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest


# =========================
# 6. DEPLOY TO EKS
# =========================
  deploy:
    runs-on: agent-1
    needs: docker

    steps:
      - uses: actions/checkout@v4

      # ✅ Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ✅ Connect to EKS
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ap-south-1 --name devops-eks-cluster

      # ✅ Debug (very useful)
      - name: Debug
        run: |
          which kubectl
          kubectl version --client
          aws --version

      # ✅ Deploy to Kubernetes
      - name: Deploy to EKS
        run: |
          kubectl get nodes
          kubectl apply -f ds.yml
